<!DOCTYPE html>
<html>

<head>
    <title>Date Picker Example</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/daterangepicker/daterangepicker.css">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

</head>

<body class="p-5">

    <h3>Appointment Date Picker</h3>

    <!-- INPUT -->
    <input type="text" id="calendar" class="form-control" placeholder="Select date">

    <br>

    <!-- RESULT -->
    <div id="result" class="alert alert-info">
        No date selected
    </div>

    <!-- JS -->
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/moment@2.29.4/min/moment.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/daterangepicker/daterangepicker.min.js"></script>

    <script>
        $('#calendar').daterangepicker({
            singleDatePicker: true, // only 1 day
            timePicker: true,
            timePicker24Hour: true,

            // disable weekend
            isInvalidDate: function (date) {
                return (date.day() === 0 || date.day() === 6);
            },

            locale: { format: 'YYYY-MM-DD HH:mm' }

        }, function (start, end) {

            // force time 8AM - 5PM
            start.set({ hour: 8, minute: 0 });
            end = start.clone().set({ hour: 17, minute: 0 });

            let text = start.format('YYYY-MM-DD HH:mm') +
                " → " +
                end.format('YYYY-MM-DD HH:mm');

            $('#calendar').val(text);
            $('#result').html("Selected: " + text);
        });
    </script>

</body>

</html>
